<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Question</title>
    <style>
        body { background: #ff4d6d; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; text-align: center; font-family: sans-serif; }
        .content { position: relative; width: 100%; max-width: 500px; }
        button { font-size: 1.5rem; padding: 15px 30px; border: none; border-radius: 50px; cursor: pointer; transition: 0.2s; }
        #yes { background: #ffffff; color: #ff4d6d; margin: 10px; }
        #no { background: #333; color: white; position: absolute; }
    </style>
</head>
<body>
    <div class="content">
        <h1>Will you be my forever? 💍</h1>
        <button id="yes" onclick="alert('Yay! I love you! ❤️'); location.href='celebrate.html'">YES!</button>
        <button id="no" onmouseover="moveButton()">No</button>
    </div>

    <script>
        function moveButton() {
            const btn = document.getElementById('no');
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 100);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }
    </script>
</body>
</html>

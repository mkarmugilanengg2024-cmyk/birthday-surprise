<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memories</title>
    <style>
        body {
            background-color: #fff5f7;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 { color: #ff4d6d; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; }

        /* The Grid for 10 Photos */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .memory-card {
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .memory-card:hover {
            transform: scale(1.05) rotate(2deg);
        }

        .memory-card img {
            width: 100%;
            height: 200px;
            object-fit: cover; /* Keeps images looking clean */
            border-radius: 5px;
        }

        .footer-nav {
            margin-top: 50px;
            padding-bottom: 30px;
        }

        .btn {
            background: #ff4d6d;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
        }
    </style>
</head>
<body>

    <h1>Our Beautiful Journey ❤️</h1>
    <p>Every moment with you is a treasure I hold dear.</p>

    <div class="gallery">
        <div class="memory-card"><img src="image1.jpg" alt="Memory 1"></div>
        <div class="memory-card"><img src="image2.jpg" alt="Memory 2"></div>
        <div class="memory-card"><img src="image3.jpg" alt="Memory 3"></div>
        <div class="memory-card"><img src="image4.webp" alt="Memory 4"></div>
        <div class="memory-card"><img src="image5.jpg" alt="Memory 5"></div>
        <div class="memory-card"><img src="image6.jpg" alt="Memory 6"></div>
        <div class="memory-card"><img src="image7.jpg" alt="Memory 7"></div>
        <div class="memory-card"><img src="image8.jpg" alt="Memory 8"></div>
        <div class="memory-card"><img src="image9.jpg" alt="Memory 9"></div>
        <div class="memory-card"><img src="image10.jpg" alt="Memory 10"></div>
    </div>

    <div class="footer-nav">
        <a href="propose.html" class="btn">Next: I have a question...</a>
    </div>

</body>
</html>

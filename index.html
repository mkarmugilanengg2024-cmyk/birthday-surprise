<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Surprise for You</title>
    <style>
        body { background: #fff5f7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Arial', sans-serif; }
        .card { text-align: center; padding: 40px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #ff4d6d; }
        .btn { background: #ff4d6d; color: white; padding: 12px 24px; text-decoration: none; border-radius: 25px; display: inline-block; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: #c9184a; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hey, Beautiful! ❤️</h1>
        <p>I have a special birthday surprise waiting for you.</p>
        <a href="message.html" class="btn">Open Your Surprise</a>
    </div>
</body>
</html>
